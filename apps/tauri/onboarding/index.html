<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>欢迎使用 QuantClaw</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0e1116;
        --panel: #161b22;
        --panel-2: #1c2129;
        --text: #e6edf3;
        --muted: #8b949e;
        --border: #30363d;
        --accent: #2f81f7;
        --accent-hover: #4493f8;
        --good: #3fb950;
        --warn: #d29922;
        --bad: #f85149;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f8fa;
          --panel: #ffffff;
          --panel-2: #f0f3f6;
          --text: #1f2328;
          --muted: #59636e;
          --border: #d1d9e0;
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .progress {
        display: flex;
        gap: 8px;
        justify-content: center;
        padding: 18px 24px 6px;
      }
      .progress-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--border);
        transition: background 0.2s ease, transform 0.2s ease;
      }
      .progress-dot.active {
        background: var(--accent);
        transform: scale(1.3);
      }
      .progress-dot.done {
        background: var(--good);
      }
      main {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        padding: 12px 40px 16px;
        overflow-y: auto;
        animation: fade 0.25s ease;
      }
      @keyframes fade {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .step-icon {
        font-size: 56px;
        text-align: center;
        margin: 8px 0 16px;
        line-height: 1;
      }
      .step-title {
        font-size: 26px;
        font-weight: 600;
        text-align: center;
        margin: 0 0 10px;
      }
      .step-subtitle {
        font-size: 14px;
        color: var(--muted);
        text-align: center;
        line-height: 1.55;
        max-width: 540px;
        margin: 0 auto 24px;
      }
      .perm-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 560px;
        width: 100%;
        margin: 0 auto;
      }
      .perm {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        border-radius: 10px;
        background: var(--panel);
        border: 1px solid var(--border);
      }
      .perm-text { flex: 1 1 auto; min-width: 0; }
      .perm-text .label {
        font-weight: 600;
        font-size: 14px;
        margin: 0 0 2px;
      }
      .perm-text .desc {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.4;
        margin: 0;
      }
      .pill {
        font-size: 10px;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }
      .pill.granted { background: rgba(63, 185, 80, 0.15); color: var(--good); }
      .pill.denied { background: rgba(248, 81, 73, 0.15); color: var(--bad); }
      .pill.pending { background: rgba(210, 153, 34, 0.15); color: var(--warn); }
      button {
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        padding: 7px 14px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease;
      }
      button:hover:not(:disabled) {
        background: var(--border);
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #ffffff;
      }
      button.primary:hover:not(:disabled) {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }
      button.primary.large {
        padding: 10px 22px;
        font-size: 14px;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .step-cta {
        display: flex;
        justify-content: center;
        margin-top: 28px;
      }
      footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 24px;
        border-top: 1px solid var(--border);
        background: var(--bg);
      }
      footer .left { color: var(--muted); font-size: 12px; min-width: 120px; }
      footer .center { display: flex; gap: 8px; }
      footer .right { display: flex; gap: 10px; min-width: 120px; justify-content: flex-end; }
      .check-list {
        list-style: none;
        padding: 0;
        margin: 0 auto;
        max-width: 460px;
      }
      .check-list li {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 0;
        font-size: 14px;
      }
      .check-list .icon { width: 20px; text-align: center; }
      .check-list .icon.granted { color: var(--good); }
      .check-list .icon.denied { color: var(--bad); }
      .check-list .icon.pending { color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="progress" id="progress"></div>
    <main id="main"></main>
    <footer>
      <div class="left" id="footer-status">&nbsp;</div>
      <div class="center"></div>
      <div class="right">
        <button id="back-btn">上一步</button>
        <button id="skip-btn">跳过</button>
        <button id="next-btn" class="primary">继续</button>
      </div>
    </footer>

    <script>
      async function detectPlatform() {
        try {
          return await tauriInvoke("get_runtime_platform");
        } catch (err) {
          console.warn("get_runtime_platform failed, falling back to userAgent", err);
          // Fallback for browser-only preview without Tauri IPC.
          const ua = navigator.userAgent.toLowerCase();
          if (ua.includes("windows")) return "windows";
          if (ua.includes("linux")) return "linux";
          return "macos";
        }
      }

      function buildSteps(platform) {
        if (platform === "linux") {
          return [
            {
              id: "welcome",
              icon: "🐧",
              title: "欢迎使用 QuantClaw",
              subtitle:
                "很快就可以开始使用了。Linux 的权限限制比 macOS 更少。" +
                "我们会快速确认桌面通知权限，屏幕捕获目前仍仅支持 macOS。",
              perms: [
                { name: "screen_recording", label: "屏幕捕获（当前仅支持 macOS）" },
                { name: "notifications", label: "通知" },
              ],
              ctaLabel: "继续",
            },
            {
              id: "done",
              icon: "✅",
              title: "一切就绪",
              subtitle:
                "QuantClaw 已在系统托盘中运行，随时可以从托盘图标打开并开始对话。",
              perms: [],
              isFinal: true,
            },
          ];
        }

        if (platform === "windows") {
          return [
            {
              id: "welcome",
              icon: "🪟",
              title: "欢迎使用 QuantClaw",
              subtitle:
                "接下来会引导你完成 QuantClaw 在 Windows 上最常用的权限设置：麦克风、摄像头，以及可选的输入监控。",
              perms: [],
              ctaLabel: "开始设置",
            },
            {
              id: "av",
              icon: "🎙️",
              title: "麦克风与摄像头",
              subtitle:
                "请在 Windows 隐私设置中授权，这样 QuantClaw 才能支持语音与视觉相关功能。",
              perms: [
                { name: "microphone", label: "麦克风" },
                { name: "camera", label: "摄像头" },
              ],
            },
            {
              id: "input",
              icon: "⌨️",
              title: "输入监控（可选）",
              subtitle:
                "Windows 上的全局输入监听需要管理员权限。" +
                "如果你跳过这一步，QuantClaw 仍可正常完成常规桌面控制。",
              perms: [
                { name: "input_monitoring", label: "输入监控（管理员）" },
              ],
              optional: true,
            },
            {
              id: "notifications",
              icon: "🔔",
              title: "通知",
              subtitle:
                "Windows 通知会通过操作中心显示。" +
                "建议保持开启，以便 QuantClaw 在任务完成或需要你处理时及时提醒。",
              perms: [
                { name: "notifications", label: "通知" },
              ],
              optional: true,
            },
            {
              id: "done",
              icon: "✅",
              title: "一切就绪",
              subtitle:
                "QuantClaw 已在系统托盘中运行，随时可以从托盘图标打开并开始对话。",
              perms: [],
              isFinal: true,
            },
          ];
        }

        return [
          {
            id: "welcome",
            icon: "👋",
            title: "欢迎使用 QuantClaw",
            subtitle:
              "QuantClaw 是一个运行在 macOS 菜单栏中的智能体，可以代你执行操作。" +
              "接下来会引导你授予它所需的系统权限。" +
              "这些权限之后都可以在系统设置中重新调整。",
            perms: [],
            ctaLabel: "开始设置",
          },
          {
            id: "accessibility",
            icon: "🖱️",
            title: "辅助功能权限",
            subtitle:
              "允许 QuantClaw 代你点击、输入，并读取其他应用界面。" +
              "这是控制 Mac 的智能体最重要的一项权限。" +
              "点击“授权”后会打开“系统设置 → 隐私与安全性 → 辅助功能”，然后把 QuantClaw 打开。",
            perms: [
              { name: "accessibility", label: "辅助功能" },
            ],
          },
          {
            id: "screen_input",
            icon: "🖥️",
            title: "查看与感知屏幕",
            subtitle:
              "屏幕录制权限让智能体能够看到当前屏幕内容，并结合上下文执行操作。" +
              "输入监控让它能接收全局快捷键，并感知自身窗口之外的键盘与鼠标活动。",
            perms: [
              { name: "screen_recording", label: "屏幕录制" },
              { name: "input_monitoring", label: "输入监控" },
            ],
          },
          {
            id: "automation",
            icon: "🤖",
            title: "控制其他应用",
            subtitle:
              "自动化权限允许 QuantClaw 通过 AppleScript 控制 Finder、邮件、Safari、日历、提醒事项、备忘录、音乐等可脚本化应用。" +
              "macOS 会在首次调用每个应用时分别向你确认授权。",
            perms: [
              { name: "automation", label: "自动化（AppleScript）" },
            ],
          },
          {
            id: "voice_vision",
            icon: "🎙️",
            title: "语音与视觉",
            subtitle:
              "启用语音指令与视觉输入。" +
              "如果你只通过键盘聊天使用，可以跳过这一步。",
            perms: [
              { name: "microphone", label: "麦克风" },
              { name: "camera", label: "摄像头" },
              { name: "speech_recognition", label: "语音识别" },
            ],
            optional: true,
          },
          {
            id: "notifications",
            icon: "🔔",
            title: "通知",
            subtitle:
              "允许 QuantClaw 在长任务完成或需要你处理时提醒你。" +
              "macOS 会以横幅通知的方式显示，具体行为可在系统设置中调整。",
            perms: [
              { name: "notifications", label: "通知" },
            ],
            optional: true,
          },
          {
            id: "advanced",
            icon: "⚙️",
            title: "高级权限（可选）",
            subtitle:
              "这些权限会让智能体获得更广泛的系统访问能力。" +
              "大多数用户可以先跳过，等后续某项功能确实需要时再到系统设置中授权。",
            perms: [
              { name: "full_disk_access", label: "完全磁盘访问权限" },
              { name: "local_network", label: "本地网络" },
            ],
            optional: true,
          },
          {
            id: "done",
            icon: "✅",
            title: "一切就绪",
            subtitle:
              "QuantClaw 已常驻在菜单栏中，随时可以点击图标开始对话。" +
              "下面会显示你刚刚授予的权限，之后也可以随时在系统设置中重新调整。",
            perms: [],
            isFinal: true,
          },
        ];
      }

      let STEPS = [];

      function resolveInvoke() {
        return window.__TAURI__?.core?.invoke ?? null;
      }

      async function tauriInvoke(cmd, args) {
        const invoke = resolveInvoke();
        if (!invoke) {
          throw new Error(
            "Tauri IPC bridge not available (window.__TAURI__.core.invoke is missing)."
          );
        }
        return invoke(cmd, args);
      }

      const progressEl = document.getElementById("progress");
      const mainEl = document.getElementById("main");
      const footerStatus = document.getElementById("footer-status");
      const backBtn = document.getElementById("back-btn");
      const skipBtn = document.getElementById("skip-btn");
      const nextBtn = document.getElementById("next-btn");

      let currentIndex = 0;
      let statusMap = {};
      let refreshIntervalId = null;

      function el(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined) node.textContent = text;
        return node;
      }

      function pillClass(status) {
        if (status === "granted") return "granted";
        if (status === "denied") return "denied";
        return "pending";
      }
      function pillText(status) {
        if (status === "granted") return "已授权";
        if (status === "denied") return "已拒绝";
        if (status === "not_determined") return "未设置";
        return "检查中";
      }

      function renderProgress() {
        while (progressEl.firstChild) progressEl.removeChild(progressEl.firstChild);
        STEPS.forEach((_, i) => {
          const dot = el("div", "progress-dot");
          if (i < currentIndex) dot.classList.add("done");
          if (i === currentIndex) dot.classList.add("active");
          progressEl.appendChild(dot);
        });
      }

      function renderPermRow(p) {
        const status = statusMap[p.name] ?? "pending";
        const row = el("div", "perm");

        const textWrap = el("div", "perm-text");
        textWrap.appendChild(el("p", "label", p.label));
        textWrap.appendChild(el("p", "desc", p.desc ?? ""));
        row.appendChild(textWrap);

        row.appendChild(el("span", `pill ${pillClass(status)}`, pillText(status)));

        const btn = el("button", null, status === "granted" ? "已授权" : "授权");
        if (status === "granted") btn.disabled = true;
        btn.addEventListener("click", () => grant(p.name));
        row.appendChild(btn);

        return row;
      }

      function renderFinalChecklist() {
        const list = el("ul", "check-list");
        const allPerms = STEPS.flatMap((s) => s.perms ?? []);
        const seen = new Set();
        for (const p of allPerms) {
          if (seen.has(p.name)) continue;
          seen.add(p.name);
          const status = statusMap[p.name] ?? "pending";
          const item = el("li");
          const icon = el("span", `icon ${pillClass(status)}`,
            status === "granted" ? "✓" : status === "denied" ? "✗" : "—");
          item.appendChild(icon);
          item.appendChild(el("span", null, p.label));
          item.appendChild(el("span", `pill ${pillClass(status)}`, pillText(status)));
          item.querySelector(".pill").style.marginLeft = "auto";
          list.appendChild(item);
        }
        return list;
      }

      function renderStep() {
        const step = STEPS[currentIndex];
        while (mainEl.firstChild) mainEl.removeChild(mainEl.firstChild);

        if (step.icon) mainEl.appendChild(el("div", "step-icon", step.icon));
        mainEl.appendChild(el("h1", "step-title", step.title));
        mainEl.appendChild(el("p", "step-subtitle", step.subtitle));

        if (step.isFinal) {
          mainEl.appendChild(renderFinalChecklist());
        } else if (step.perms && step.perms.length > 0) {
          const list = el("div", "perm-list");
          for (const p of step.perms) list.appendChild(renderPermRow(p));
          mainEl.appendChild(list);
        }

        // Footer button states
        backBtn.style.visibility = currentIndex === 0 ? "hidden" : "visible";
        if (step.id === "welcome") {
          skipBtn.style.display = "none";
          nextBtn.textContent = step.ctaLabel ?? "开始设置";
          nextBtn.classList.add("large");
        } else if (step.isFinal) {
          skipBtn.style.display = "none";
          nextBtn.textContent = "启动 QuantClaw";
          nextBtn.classList.add("large");
        } else {
          skipBtn.style.display = step.optional ? "inline-flex" : "none";
          nextBtn.textContent = "继续";
          nextBtn.classList.remove("large");
        }

        // Footer status text
        if (step.perms && step.perms.length > 0) {
          const granted = step.perms.filter(
            (p) => statusMap[p.name] === "granted"
          ).length;
          footerStatus.textContent = `已授权 ${granted} / ${step.perms.length}`;
        } else if (step.isFinal) {
          const allEssential = STEPS
            .filter((s) => !s.optional && !s.isFinal && s.id !== "welcome")
            .flatMap((s) => s.perms ?? []);
          const granted = allEssential.filter(
            (p) => statusMap[p.name] === "granted"
          ).length;
          footerStatus.textContent = `关键权限已授权 ${granted} / ${allEssential.length}`;
        } else {
          footerStatus.textContent = `第 ${currentIndex + 1} 步，共 ${STEPS.length} 步`;
        }

        renderProgress();
      }

      async function refresh() {
        try {
          const list = await tauriInvoke("get_permissions_status");
          const map = {};
          for (const p of list) map[p.name] = p.status;
          statusMap = map;
          renderStep();
        } catch (err) {
          footerStatus.textContent = String(err.message ?? err);
          footerStatus.style.color = "var(--bad)";
        }
      }

      async function grant(name) {
        try {
          await tauriInvoke("request_permission", { name });
        } catch (err) {
          console.error("request_permission failed:", err);
          footerStatus.textContent = `授权 ${name} 失败：${String(err.message ?? err)}`;
          footerStatus.style.color = "var(--bad)";
        }
        refresh();
      }

      function next() {
        if (currentIndex < STEPS.length - 1) {
          currentIndex++;
          renderStep();
        } else {
          // Final step CTA → close wizard.
          tauriInvoke("complete_onboarding").catch((err) => {
            footerStatus.textContent = String(err.message ?? err);
            footerStatus.style.color = "var(--bad)";
          });
        }
      }

      function back() {
        if (currentIndex > 0) {
          currentIndex--;
          renderStep();
        }
      }

      function skip() {
        // Same as next but ensures we move forward even on optional steps without granting.
        next();
      }

      backBtn.addEventListener("click", back);
      skipBtn.addEventListener("click", skip);
      nextBtn.addEventListener("click", next);

      async function init() {
        const platform = await detectPlatform();
        STEPS = buildSteps(platform);
        currentIndex = 0;
        statusMap = {};
        renderStep();
        await refresh();
        if (refreshIntervalId) clearInterval(refreshIntervalId);
        refreshIntervalId = setInterval(refresh, 2000);
      }

      // Initial render + polling.
      init();
    </script>
  </body>
</html>
